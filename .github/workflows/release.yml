name: Release

# Runs when a change lands on main. Bumps the patch version, builds the
# installable VSIX, and publishes a GitHub Release with the VSIX attached.
# The version-bump commit is pushed with the built-in GITHUB_TOKEN, whose
# pushes do not re-trigger workflows, so there is no release loop.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: npm run package

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            *.vsix \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
